name: Deploy Website to Server via FTP

# ─────────────────────────────────────────────────────────────────────────────
# TRIGGER: Runs automatically on push to main, or manually via Actions tab.
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — LINT
  # Checks all PHP files for syntax errors BEFORE deploying.
  # A broken PHP file will never reach the server.
  # ───────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint PHP Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none

      - name: Check PHP Syntax
        run: |
          echo "Linting all PHP files (excluding vendor/)..."
          find . -name "*.php" -not -path "*/vendor/*" -print0 | xargs -0 -n 1 php -l
          echo "All PHP files passed syntax check."

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — DEPLOY
  # Runs only after the Lint job passes.
  #
  # REQUIRED GITHUB SECRETS (repo Settings → Secrets and variables → Actions):
  #
  #   FTP_SERVER         — Your FTP host (e.g. ftpupload.net for InfinityFree)
  #   FTP_USERNAME       — Your FTP login username (e.g. epiz_12345678)
  #   FTP_PASSWORD       — Your FTP login password
  #   SITE_DOMAIN        — Your website domain name (e.g. plasmalab.infinityfreeapp.com)
  #
  #   PLASMA_DB_HOST     — DB Host given by hosting. (e.g. sql123.epizy.com)
  #   PLASMA_DB_NAME     — Database name.            (e.g. epiz_12345678_plasma)
  #   PLASMA_DB_USER     — Database username.        (e.g. epiz_12345678)
  #   PLASMA_DB_PASS     — Database password.
  #   MIGRATION_TOKEN    — A secure random token you choose (e.g. 32-character string)
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Server via FTP
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer
          coverage: none

      # Cache vendor/ directory to speed up repeat deployments
      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Production Composer Dependencies
        run: |
          composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction

      # ── PREPARE SECRETS FILE ───────────────────────────────────────────────
      # Write credentials from GitHub Secrets directly into the config_secrets.php
      # file so that the website can connect to the database on InfinityFree.
      # ──────────────────────────────────────────────────────────────────────
      - name: Generate Database Secrets File
        run: |
          echo "Generating config_secrets.php file..."
          # Use printf so GitHub Actions secrets are expanded correctly.
          # NOTE: 'EOF' with quotes prevents expansion — we must NOT quote it.
          printf '<?php\n' > Database/config_secrets.php
          printf '$db_host = "%s";\n' "${{ secrets.PLASMA_DB_HOST }}" >> Database/config_secrets.php
          printf '$db_name = "%s";\n' "${{ secrets.PLASMA_DB_NAME }}" >> Database/config_secrets.php
          printf '$db_user = "%s";\n' "${{ secrets.PLASMA_DB_USER }}" >> Database/config_secrets.php
          printf '$db_pass = "%s";\n' "${{ secrets.PLASMA_DB_PASS }}" >> Database/config_secrets.php
          printf "define('MIGRATION_TOKEN', \"%s\");\n" "${{ secrets.MIGRATION_TOKEN }}" >> Database/config_secrets.php
          printf "define('GEMINI_API', \"%s\");\n" "${{ secrets.GEMINI_API }}" >> Database/config_secrets.php
          echo "Database secrets file generated."
          cat Database/config_secrets.php

      # ── FILE DEPLOYMENT via FTP ────────────────────────────────────────────
      # Deploy the files using FTP. InfinityFree requires files to be uploaded
      # to the 'htdocs' directory to be web accessible.
      # ──────────────────────────────────────────────────────────────────────
      - name: Deploy Files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: htdocs/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
            .DS_Store

      # ── DATABASE MIGRATIONS ────────────────────────────────────────────────
      # Since we cannot run CLI commands via SSH on InfinityFree, we trigger 
      # the migration script by making a secure HTTP request to the live URL.
      # Note: InfinityFree's browser-only security challenge may block curl.
      # We use 'continue-on-error: true' so the build passes, and print the browser URL.
      # ──────────────────────────────────────────────────────────────────────
      - name: Trigger Database Migrations via Web
        continue-on-error: true
        run: |
          echo "--------------------------------------------------------"
          echo "Triggering database migrations at:"
          echo "http://${{ secrets.SITE_DOMAIN }}/Database/migrate.php?token=${{ secrets.MIGRATION_TOKEN }}"
          echo "--------------------------------------------------------"
          curl -sf "http://${{ secrets.SITE_DOMAIN }}/Database/migrate.php?token=${{ secrets.MIGRATION_TOKEN }}" || {
            echo "::warning::Automated trigger via curl was blocked by host security challenge."
            echo "::warning::Please visit the URL above in your browser to run migrations."
          }

