name: Deploy Website to Server

# ─────────────────────────────────────────────────────────────────────────────
# TRIGGER: Runs automatically on push to main, or manually via Actions tab.
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — LINT
  # Checks all PHP files for syntax errors BEFORE deploying.
  # A broken PHP file will never reach the server.
  # ───────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint PHP Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none

      - name: Check PHP Syntax
        run: |
          echo "Linting all PHP files (excluding vendor/)..."
          find . -name "*.php" -not -path "*/vendor/*" -print0 | xargs -0 -n 1 php -l
          echo "All PHP files passed syntax check."

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — DEPLOY
  # Runs only after the Lint job passes.
  #
  # REQUIRED GITHUB SECRETS (repo Settings → Secrets and variables → Actions):
  #
  #   SSH_HOST           — Your server IP or domain (e.g. 203.0.113.10)
  #   SSH_USER           — SSH login username (e.g. ubuntu, root)
  #   SSH_PRIVATE_KEY    — The PRIVATE key used to connect to your server
  #                        (see DEPLOYMENT.md for how to generate this)
  #   SSH_PORT           — SSH port. Optional, defaults to 22.
  #   DEPLOY_PATH        — Full path on server (e.g. /var/www/html/plasmalab)
  #
  #   MYSQL_ROOT_PASS    — The root password for MySQL on your server
  #                        (used ONCE to create the app database & user)
  #
  #   PLASMA_DB_HOST     — DB host as seen from the server. Usually: localhost
  #   PLASMA_DB_NAME     — Name of the database to create. e.g: plasma_lab_ru
  #   PLASMA_DB_USER     — DB username to create.          e.g: plasma_user
  #   PLASMA_DB_PASS     — DB password to set.             e.g: choose any strong password
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer
          coverage: none

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Production Composer Dependencies
        run: |
          composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction

      # ── SSH SETUP ──────────────────────────────────────────────────────────
      # Write the private key and add the server to known_hosts so SSH
      # commands below don't prompt for confirmation.
      # ──────────────────────────────────────────────────────────────────────
      - name: Configure SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH_PORT="${{ secrets.SSH_PORT }}"
          SSH_PORT="${SSH_PORT:-22}"
          ssh-keyscan -p "$SSH_PORT" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          echo "SSH key configured."

      # ── DATABASE SETUP ─────────────────────────────────────────────────────
      # Connects to MySQL on the server as root and creates the database and
      # application user if they do not already exist.
      # On the FIRST deploy this sets everything up automatically.
      # On subsequent deploys it safely skips (IF NOT EXISTS).
      # ──────────────────────────────────────────────────────────────────────
      - name: Create Database and User on Server
        run: |
          SSH_PORT="${{ secrets.SSH_PORT }}"
          SSH_PORT="${SSH_PORT:-22}"
          echo "Setting up database and user on server..."
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "mysql -u root -p'${{ secrets.MYSQL_ROOT_PASS }}' <<'ENDSQL'
          CREATE DATABASE IF NOT EXISTS \`${{ secrets.PLASMA_DB_NAME }}\`
            CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
          CREATE USER IF NOT EXISTS '${{ secrets.PLASMA_DB_USER }}'@'localhost'
            IDENTIFIED BY '${{ secrets.PLASMA_DB_PASS }}';
          GRANT ALL PRIVILEGES ON \`${{ secrets.PLASMA_DB_NAME }}\`.*
            TO '${{ secrets.PLASMA_DB_USER }}'@'localhost';
          FLUSH PRIVILEGES;
          ENDSQL"
          echo "Database and user ready."

      # ── FILE DEPLOYMENT ────────────────────────────────────────────────────
      # rsync copies all project files to the server.
      # --delete removes any server files that no longer exist in the repo.
      # ──────────────────────────────────────────────────────────────────────
      - name: Deploy Files to Server via Rsync
        run: |
          SSH_PORT="${{ secrets.SSH_PORT }}"
          SSH_PORT="${SSH_PORT:-22}"
          echo "Syncing files to ${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}..."
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.DS_Store' \
            -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT" \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/
          echo "Files deployed."

      # ── DATABASE MIGRATIONS ────────────────────────────────────────────────
      # After files are synced, run the migration script on the server.
      # First deploy: imports the full Database/plasma_lab_ru.sql baseline.
      # Later deploys: applies only new .sql files in Database/migrations/.
      # ──────────────────────────────────────────────────────────────────────
      - name: Run Database Migrations on Server
        run: |
          SSH_PORT="${{ secrets.SSH_PORT }}"
          SSH_PORT="${SSH_PORT:-22}"
          echo "Running database migrations..."
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && \
             PLASMA_DB_HOST='${{ secrets.PLASMA_DB_HOST }}' \
             PLASMA_DB_NAME='${{ secrets.PLASMA_DB_NAME }}' \
             PLASMA_DB_USER='${{ secrets.PLASMA_DB_USER }}' \
             PLASMA_DB_PASS='${{ secrets.PLASMA_DB_PASS }}' \
             php Database/migrate.php"
          echo "Migrations done."

      # ── CLEANUP ────────────────────────────────────────────────────────────
      # Always delete the private key from the runner after the job finishes.
      # ──────────────────────────────────────────────────────────────────────
      - name: Cleanup SSH Key
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
          echo "SSH key removed from runner."
